name: Feature request
description: Propose a new capability or workflow improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: dropdown
    id: repository
    attributes:
      label: Repository
      description: Which repository or surface is most affected?
      options:
        - aiden
        - aiden-engine
        - aiden-api
        - aiden-policies-hipaa
        - aiden-policies-controls
        - aiden-policies-arch
        - aiden-tools
        - aiden-demo
        - cross-repo
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user or engineering problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the change you want and any constraints.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Note other approaches you considered and why they were not chosen.
  - type: textarea
    id: risks
    attributes:
      label: Risks or rollout notes
      description: Mention migration, operational, security, or compliance concerns.
